name: Bug report
description: Report a reproducible bug
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please provide enough detail to reproduce the issue.
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and inputs.
      placeholder: |
        1. Run `...`
        2. Edit `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Optional minimal repo/snippet/script that reproduces the issue.
      render: shell
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste relevant stack traces or command output.
      render: shell
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, millstone version, CLI provider and version.
      placeholder: Ubuntu 24.04, Python 3.11, millstone 0.3.3, codex CLI 1.x
    validations:
      required: true
