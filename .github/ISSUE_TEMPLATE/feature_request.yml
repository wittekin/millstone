name: Feature request
description: Propose an enhancement
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Clear problem statements help maintainers evaluate quickly.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the preferred approach and user impact.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives did you consider and why not choose them?
    validations:
      required: false
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: What should explicitly not be included?
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Links, examples, prior art, or screenshots.
    validations:
      required: false
