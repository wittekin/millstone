name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run unit tests (PR)
        if: github.event_name == 'pull_request'
        run: pytest -m "not integration"

      - name: Run full tests (push/workflow_dispatch)
        if: github.event_name != 'pull_request'
        run: pytest

      - name: Install wheel and smoke test CLI
        run: |
          python -m pip uninstall -y millstone || true
          python -m pip install .
          millstone --version

      - name: Install with pipx and smoke test CLI
        run: |
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys

          runner_temp = pathlib.Path(os.environ["RUNNER_TEMP"])
          pipx_home = runner_temp / "pipx-home"
          pipx_bin_dir = runner_temp / "pipx-bin"

          env = os.environ.copy()
          env["PIPX_HOME"] = str(pipx_home)
          env["PIPX_BIN_DIR"] = str(pipx_bin_dir)

          subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", "pipx"], env=env)
          subprocess.check_call(
              [sys.executable, "-m", "pipx", "install", "--python", sys.executable, "."],
              env=env,
          )

          candidates = [pipx_bin_dir / "millstone", pipx_bin_dir / "millstone.exe"]
          for candidate in candidates:
              if candidate.exists():
                  subprocess.check_call([str(candidate), "--version"], env=env)
                  break
          else:
              raise SystemExit(f"millstone executable not found in {pipx_bin_dir}")
          PY

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run unit tests with coverage (PR)
        if: github.event_name == 'pull_request'
        run: pytest -m "not integration" --cov=millstone --cov-report=xml --cov-report=term-missing

      - name: Run full tests with coverage (push/workflow_dispatch)
        if: github.event_name != 'pull_request'
        run: pytest --cov=millstone --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          pip install -e .[release]
          python -m build
          twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
